name: Weekly Spy Sync

# Chạy tự động 02:07 UTC thứ Hai (~09:07 sáng thứ Hai giờ Việt Nam, UTC+7).
# Lệch mốc tròn (phút 07 thay vì 00) để giảm khả năng bị GitHub trễ/drop run.
# Có thể chạy thủ công qua tab Actions (workflow_dispatch).
on:
  schedule:
    - cron: "7 2 * * 1"
  workflow_dispatch: {}

# Không cần ghi vào repo; chỉ gọi Google Sheets API.
permissions:
  contents: read

concurrency:
  group: weekly-spy-sync
  cancel-in-progress: false

jobs:
  spy-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 (có WebSocket native) — cần cho @supabase/supabase-js khi đẩy Supabase.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run weekly spy sync
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ADS_SOURCE_PROVIDER: ${{ secrets.ADS_SOURCE_PROVIDER }}
          ADS_SOURCE_API_URL: ${{ secrets.ADS_SOURCE_API_URL }}
          ADS_SOURCE_API_KEY: ${{ secrets.ADS_SOURCE_API_KEY }}
          # Supabase: cuối pipeline tự đẩy datasets lên Supabase cho dashboard đọc.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # crawl tuning (dùng Repository variables — vars — hoặc để trống dùng default)
          ADS_SOURCE_COUNTRY: ${{ vars.ADS_SOURCE_COUNTRY }}
          ADS_SOURCE_MAX_ADS: ${{ vars.ADS_SOURCE_MAX_ADS }}
          # incremental cache + AI vision (prep)
          VISUAL_AI_PROVIDER: ${{ vars.VISUAL_AI_PROVIDER }}
          VISUAL_AI_API_KEY: ${{ secrets.VISUAL_AI_API_KEY }}
          MAX_AI_ANALYSIS_PER_RUN: ${{ vars.MAX_AI_ANALYSIS_PER_RUN }}
          AI_BATCH_SIZE: ${{ vars.AI_BATCH_SIZE }}
          AI_RETRY_LIMIT: ${{ vars.AI_RETRY_LIMIT }}
          TEXT_ANALYSIS_PROMPT_VERSION: ${{ vars.TEXT_ANALYSIS_PROMPT_VERSION }}
          VISUAL_ANALYSIS_PROMPT_VERSION: ${{ vars.VISUAL_ANALYSIS_PROMPT_VERSION }}
        run: npm run spy:weekly

      # Tạo Weekly Intelligence Report (Weekly_Summary + Action_Plan + Swipe suggestions)
      # ngay sau khi crawl/phân tích xong. KHÔNG dùng Exa (Exa chỉ chạy thủ công).
      - name: Generate weekly intelligence report
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ADS_SOURCE_PROVIDER: ${{ secrets.ADS_SOURCE_PROVIDER }}
        run: npm run report:weekly
