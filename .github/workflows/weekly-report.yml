name: Generate Weekly Spy Report

# Tạo BÁO CÁO TUẦN TRƯỚC (thứ Hai → Chủ Nhật) và lưu vào tab `Weekly Reports`
# (không ghi đè kỳ cũ). GitHub Actions chạy theo UTC.
#   cron "0 0 * * 1" = 00:00 UTC thứ Hai = 07:00 sáng thứ Hai giờ Việt Nam (UTC+7).
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: weekly-spy-report
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # FIX "Premature close" ở oauth2 token: ép IPv4-first + tắt Happy Eyeballs.
    env:
      NODE_OPTIONS: "--dns-result-order=ipv4first --no-network-family-autoselection"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly report (last week)
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # Mirror report lên Supabase (dashboard đọc Supabase làm nguồn chính).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TZ: Asia/Ho_Chi_Minh
        run: npm run report:weekly
